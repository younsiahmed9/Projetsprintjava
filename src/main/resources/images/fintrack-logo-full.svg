<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Cercle avec dégradé -->
  <circle cx="80" cy="100" r="70" fill="url(#grad1)" stroke="#ffffff" stroke-width="2"/>

  <!-- Cercle interne -->
  <circle cx="80" cy="100" r="55" fill="none" stroke="#ffffff" stroke-width="1.5"/>

  <!-- Lettre F dans le cercle -->
  <g transform="translate(80, 100)">
    <!-- Trait vertical -->
    <rect x="-8" y="-25" width="6" height="50" fill="#ffffff" rx="3"/>
    <!-- Trait horizontal haut -->
    <rect x="-8" y="-25" width="20" height="6" fill="#ffffff" rx="3"/>
    <!-- Trait horizontal bas -->
    <rect x="-8" y="-5" width="15" height="6" fill="#ffffff" rx="3"/>
  </g>

  <!-- Flèche montante -->
  <g transform="translate(80, 100)">
    <line x1="10" y1="0" x2="30" y2="-20" stroke="#f59e0b" stroke-width="5" stroke-linecap="round"/>
    <polygon points="30,-20 38,-15 32,-8" fill="#f59e0b"/>
  </g>

  <!-- Texte FinTrack -->
  <text x="170" y="120" font-family="Arial, sans-serif" font-size="60" font-weight="bold">
    <tspan fill="#1e3a8a">Fin</tspan><tspan fill="#059669">Track</tspan>
  </text>

  <!-- Sous-titre -->
  <text x="170" y="150" font-family="Arial, sans-serif" font-size="16" fill="#666666">
    Gérez vos finances, simplement et intelligemment
  </text>
</svg>

