<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <defs>
    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1"/>
      <stop offset="25%" style="stop-color:#2d5a3d;stop-opacity:1"/>
      <stop offset="75%" style="stop-color:#b8a836;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Cercle principal avec dégradé -->
  <circle cx="120" cy="150" r="110" fill="url(#circleGrad)" stroke="none"/>

  <!-- Cercle blanc intérieur -->
  <circle cx="120" cy="150" r="95" fill="none" stroke="white" stroke-width="3"/>

  <!-- Lettre F stylisée (blanche) -->
  <g transform="translate(120, 150)">
    <!-- Trait vertical -->
    <rect x="-12" y="-30" width="8" height="60" fill="white" rx="2"/>
    <!-- Trait horizontal haut -->
    <rect x="-12" y="-30" width="28" height="8" fill="white" rx="2"/>
    <!-- Trait horizontal bas -->
    <rect x="-12" y="5" width="20" height="8" fill="white" rx="2"/>
  </g>

  <!-- Flèche montante (jaune/vert) -->
  <g transform="translate(120, 150)">
    <line x1="15" y1="-5" x2="45" y2="-35" stroke="#b8a836" stroke-width="7" stroke-linecap="round"/>
    <polygon points="45,-35 55,-28 48,-18" fill="#f59e0b"/>
  </g>

  <!-- Texte FinTrack (Bleu et Vert) -->
  <text x="280" y="180" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="bold" letter-spacing="2">
    <tspan fill="#1e3a8a">Fin</tspan><tspan fill="#4a7c59">Track</tspan>
  </text>

  <!-- Sous-titre -->
  <text x="280" y="215" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#666666" letter-spacing="0.5">
    Gérez vos finances, simplement et intelligemment
  </text>
</svg>

